.pop-item {

// Attach population data to each store
stores.forEach(s => {
  s.pop = POPULATION[s.muni] || null;
  s.mesh = MESH_POP[s.num] || null;
});

function getMarkerColor(store) {
  if (store.closed) return '#999';
  if (!store.mesh) return '#d32f2f';
  // マーカー色は 500m昼間人口(概算) = 居住+従業者 ベース
  const d = store.mesh.pop + store.mesh.emp;
  if (d >= 30000) return '#b71c1c';
  if (d >= 10000) return '#d32f2f';
  if (d >= 5000) return '#f57c00';
  if (d >= 2000) return '#fbc02d';
  return '#9e9d24';
}

function getRatioColor(ratio) {
  if (ratio >= 200) return '#b71c1c';
  if (ratio >= 120) return '#d32f2f';
  if (ratio >= 100) return '#f57c00';
  if (ratio >= 90) return '#fbc02d';
  return '#757575';
}

let map, markers = [], infoWindow, geocoder;
let currentFilter = 'all';
let currentSort = 'num';

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.5, lng: 136.9 },
    zoom: 6,
    styles: [
      {featureType:"poi", stylers:[{visibility:"off"}]},
      {featureType:"transit", stylers:[{visibility:"simplified"}]}
    ]
  });
  geocoder = new google.maps.Geocoder();
  infoWindow = new google.maps.InfoWindow();

  const bounds = new google.maps.LatLngBounds();
  let geocodeIdx = 0;

  function geocodeNext() {
    if (geocodeIdx >= stores.length) {
      map.fitBounds(bounds);
      renderList();
      return;
    }
    const store = stores[geocodeIdx];
    const idx = geocodeIdx;
    geocodeIdx++;

    geocoder.geocode({ address: store.addr, region: 'jp' }, function(results, status) {
      if (status === 'OK') {
        const pos = results[0].geometry.location;
        store.lat = pos.lat();
        store.lng = pos.lng();

        const marker = new google.maps.Marker({
          position: pos,
          map: map,
          title: store.name,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: getMarkerColor(store),
            fillOpacity: store.closed ? 0.5 : 0.9,
            strokeColor: '#fff',
            strokeWeight: 2,
            scale: 11
          },
          label: {
            text: store.num,
            color: '#fff',
            fontSize: '10px',
            fontWeight: 'bold'
          }
        });

        marker.storeIndex = idx;
        markers.push(marker);
        bounds.extend(pos);

        marker.addListener('click', function() {
          showSidebar(store);
          map.panTo(pos);
          map.setZoom(14);
        });
      }
      setTimeout(geocodeNext, 180);
    });
  }

  geocodeNext();
  updateStats();
}

    <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(store.addr)}"
       target="_blank" class="google-link" style="background:#34a853;margin-left:8px;">ルート検索</a>

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

function renderList() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('storeList');
  list.innerHTML = '';

  let filtered = stores.filter(s => {
    if (currentFilter === 'open' && s.closed) return false;
    if (currentFilter === 'closed' && !s.closed) return false;
    if (query && !s.name.toLowerCase().includes(query) && !s.addr.toLowerCase().includes(query) && !(s.muni||'').toLowerCase().includes(query)) return false;
    return true;
  });

  // Sort
  const dayEst = (s) => s.mesh ? (s.mesh.pop + s.mesh.emp) : 0;
  filtered.sort((a, b) => {
    switch(currentSort) {
      case 'dayEst_desc': return dayEst(b) - dayEst(a);
      case 'dayEst_asc': return dayEst(a) - dayEst(b);
      case 'emp_desc': return (b.mesh?.emp || 0) - (a.mesh?.emp || 0);
      case 'emp_asc': return (a.mesh?.emp || 0) - (b.mesh?.emp || 0);
      case 'pop_desc': return (b.mesh?.pop || 0) - (a.mesh?.pop || 0);
      case 'pop_asc': return (a.mesh?.pop || 0) - (b.mesh?.pop || 0);
      case 'estF_desc': return (b.mesh?.estF || 0) - (a.mesh?.estF || 0);
      case 'estF_asc': return (a.mesh?.estF || 0) - (b.mesh?.estF || 0);
      case 'day_desc': return (b.pop?.day || 0) - (a.pop?.day || 0);
      case 'day_asc': return (a.pop?.day || 0) - (b.pop?.day || 0);
      default: return parseInt(a.num) - parseInt(b.num);
    }
  });

  filtered.forEach(s => {
    const div = document.createElement('div');
    div.className = 'store-item' + (s.closed ? ' closed' : '');
    const dayEstVal = s.mesh ? (s.mesh.pop + s.mesh.emp) : 0;
    const meshText = s.mesh
      ? `<div class="pop-info" style="color:#e65100;font-weight:bold;">☀️ 500m昼間人口(概算) ${dayEstVal.toLocaleString()}人</div>
         <div class="pop-info" style="color:#666;font-size:11px;">　┗ 居住${s.mesh.pop.toLocaleString()}+従業者${s.mesh.emp.toLocaleString()}人 / 飲食店${s.mesh.estF}店</div>`
      : '';
    const popText = s.pop
      ? `<div class="pop-info">📊 ${s.muni}(市区町村) 昼間人口${s.pop.day.toLocaleString()}人</div>`
      : '';
    div.innerHTML = `
      <div class="name">No.${s.num} ${s.name}</div>
      <div class="addr">${s.addr}</div>
      ${meshText}
      ${popText}
    `;
    div.onclick = () => {
      if (s.lat) {
        map.panTo({ lat: s.lat, lng: s.lng });
        map.setZoom(14);
        showSidebar(s);
      }
    };
    list.appendChild(div);
  });
}

function updateStats() {
  const open = stores.filter(s => !s.closed).length;
  const closed = stores.filter(s => s.closed).length;
  document.getElementById('stats').textContent = `全${stores.length}店舗 / 営業中: ${open} / 閉店: ${closed}`;
}

document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('sortSelect').addEventListener('change', function() {
  currentSort = this.value;
  renderList();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderList();
  });
});

function togglePanel() {
  const panel = document.getElementById('listPanel');
  const btn = document.getElementById('toggleList');
  if (panel.style.display === 'none') {
    panel.style.display = 'flex';
    btn.style.display = 'none';
  } else {
    panel.style.display = 'none';
    btn.style.display = 'block';
  }
}

// Initial render before geocoding completes
renderList();
